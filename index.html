<!DOCTYPE html>
<html>
<head>
<title>Rural Trends</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
text-align:center;
padding:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:black;
color:white;
border:none;
padding:10px;
border-radius:5px;
}

footer{
background:black;
color:white;
text-align:center;
padding:10px;
}
</style>
</head>

<body>

<header>
<h1>Rural Trends</h1>
<p>Men's Branded Clothing Store</p>
</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Branded Shirt</h3>
<p>₹999</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>T Shirt</h3>
<p>₹499</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Pants</h3>
<p>₹1199</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Shorts</h3>
<p>₹399</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Night Dress</h3>
<p>₹599</p>
<button>Order</button>
</div>

</div>

<footer>
<p>Rural Trends | Men's Fashion Store</p>
</footer>

</body>
</html>
